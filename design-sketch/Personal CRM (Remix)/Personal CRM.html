<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>People — Personal CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<script>
// Tweaks defaults — must be valid JSON between the markers
window.__TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variation": "B",
  "accentHue": 150,
  "warmth": 65
}/*EDITMODE-END*/;
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           oklch(97% 0.012 65);
    --sidebar-bg:   oklch(94% 0.016 65);
    --surface:      oklch(99% 0.006 65);
    --border:       oklch(90% 0.018 65);
    --text:         oklch(22% 0.018 65);
    --text-muted:   oklch(55% 0.016 65);
    --accent:       oklch(60% 0.14 150);
    --accent-subtle:oklch(95% 0.05 150);
  }

  html, body, #root {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(78% 0.02 65); }

  /* Inputs */
  input, textarea { font-family: 'DM Sans', sans-serif; }

  /* Button reset */
  button { font-family: 'DM Sans', sans-serif; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Data (plain JS, no babel) -->
<script src="crm/data.js?v=2"></script>

<!-- Shared components -->
<script type="text/babel" src="crm/components.jsx"></script>

<!-- Screen components -->
<script type="text/babel" src="crm/screens.jsx"></script>

<!-- App -->
<script type="text/babel" src="crm/app.jsx"></script>
</body>
</html>
